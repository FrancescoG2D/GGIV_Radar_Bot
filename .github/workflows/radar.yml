name: GGIV Nightly Radar

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Preleva il codice
      uses: actions/checkout@v4

    - name: Prepara Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le librerie
      run: pip install -r requirements.txt

    - name: Forgia la chiave Google dal Caveau
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > chiave_google.json

    - name: Lancia il Radar GGIV
      run: python news_bot.py
